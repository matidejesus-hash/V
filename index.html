<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Super Iván y Pedro - TV Edition</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #game-container { position: relative; width: 400px; height: 600px; }
        canvas { border: 4px solid #fff; background: #4ec0ca; width: 100%; height: 100%; }
        #pantallaInicio { position: absolute; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 4px solid #fff; }
        #pantallaInicio img { width: 100%; height: 100%; object-fit: contain; }
        #loading-text { position: absolute; bottom: 20px; color: white; font-size: 14px; }
        #menu { position: absolute; background: rgba(0,0,0,0.95); width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; border: 4px solid #fff; top:0; left:0; }
        .btn { background: #444; color: white; border: 3px solid #fff; padding: 12px; margin: 8px; cursor: pointer; font-size: 16px; width: 220px; }
        .btn:focus { background: #fff; color: #000; outline: none; transform: scale(1.1); }
        #ui { position: absolute; text-align: center; color: white; pointer-events: none; width: 100%; height: 100%; top: 0; left: 0; }
        #vidas-container { position: absolute; top: 15px; left: 15px; display: flex; gap: 5px; }
        .corazon { font-size: 28px; text-shadow: 3px 3px #000; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="pantallaInicio" onclick="quitarInicio()">
            <img src="inicio.jpg" id="img-portada">
            <div id="loading-text">CARGANDO RECURSOS...</div>
        </div>

        <div id="menu">
            <h1 id="tituloMenu">¡A VOLAR!</h1>
            <button class="btn" id="btnDefault" onclick="iniciar(1)" style="color:#4caf50">NOOB</button>
            <button class="btn" onclick="iniciar(2)" style="color:#2196f3">PRO</button>
            <button class="btn" onclick="iniciar(3)" style="color:#9c27b0">HACKER</button>
            <button class="btn" onclick="iniciar(4)" style="color:#ff5252">GOD</button>
        </div>

        <div id="ui">
            <h2 id="puntos" style="margin-top:20px; text-shadow: 2px 2px #000;">Puntos: 0</h2>
            <div id="vidas-container">
                <span id="v1" class="corazon">❤️</span>
                <span id="v2" class="corazon">❤️</span>
                <span id="v3" class="corazon">❤️</span>
            </div>
        </div>
        <canvas id="juego"></canvas>
    </div>

<script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');
    const menu = document.getElementById('menu');
    const pantallaInicio = document.getElementById('pantallaInicio');
    const loadingText = document.getElementById('loading-text');

    canvas.width = 400; canvas.height = 600;

    // --- CARGADOR DE IMÁGENES (CRÍTICO PARA TV) ---
    const imagenes = {};
    const nombresImg = ['ivan.png', 'pedro.png', 'fondo.jpg', 'textura.png', 'nave.png'];
    let cargadas = 0;

    function cargarTodo(callback) {
        nombresImg.forEach(nombre => {
            const img = new Image();
            img.src = nombre;
            img.onload = () => {
                cargadas++;
                if(cargadas === nombresImg.length) {
                    loadingText.innerText = "¡LISTO! TOCA PARA EMPEZAR";
                    callback();
                }
            };
            img.onerror = () => {
                loadingText.innerText = "ERROR CARGANDO: " + nombre;
                loadingText.style.color = "red";
            };
            imagenes[nombre.split('.')[0]] = img;
        });
    }

    // --- AUDIOS ---
    const musicaInicio = new Audio('musica inicio.mp3'); musicaInicio.loop = true;
    const musicaFondo = new Audio('musica.mp3'); musicaFondo.loop = true;
    
    let activo = false, inicioFase = 0, listoParaJugar = false;
    let neneX = 50, neneY = 300, neneSize = 70, velY = 0, score = 0, frame = 0;
    let vidas = 3, invulnerable = 0, neneActual = "Iván", dificultad = 1;
    let tuberias = [], navesEnemigas = [], lasers = [], fragmentos = [];

    cargarTodo(() => { listoParaJugar = true; });

    function fadeAudio(audio, targetVolume, duration) {
        const startVol = audio.volume;
        const steps = 10;
        const stepTime = duration / steps;
        let i = 0;
        const interval = setInterval(() => {
            i++;
            audio.volume = Math.max(0, Math.min(1, startVol + (targetVolume - startVol) * (i / steps)));
            if (i >= steps) {
                clearInterval(interval);
                if (targetVolume === 0) audio.pause();
            }
        }, stepTime);
    }

    function quitarInicio() {
        if (!listoParaJugar) return;
        if (inicioFase === 0) {
            musicaInicio.volume = 0;
            musicaInicio.play().catch(() => {});
            fadeAudio(musicaInicio, 1, 1000);
            inicioFase = 1;
        } else if (inicioFase === 1) {
            pantallaInicio.style.display = 'none';
            menu.style.display = 'flex';
            document.getElementById('btnDefault').focus();
            inicioFase = 2;
        }
    }

    function iniciar(nivel) {
        fadeAudio(musicaInicio, 0, 800);
        setTimeout(() => {
            musicaFondo.volume = 0;
            musicaFondo.play().catch(() => {});
            fadeAudio(musicaFondo, 1, 800);
        }, 200);

        dificultad = nivel;
        menu.style.display = 'none';
        vidas = 3; score = 0; frame = 0; neneY = 300; velY = 0;
        tuberias = []; navesEnemigas = []; lasers = []; fragmentos = [];
        activo = true;
    }

    window.onkeydown = (e) => {
        if (inicioFase < 2) { quitarInicio(); return; }
        if (e.key === 'ArrowUp' || e.keyCode === 38 || e.code === 'Space') { if(activo) velY = -7.2; }
        if (e.key === 'Enter' || e.keyCode === 13) {
            if(activo) lasers.push({ x: neneX + neneSize, y: neneY + neneSize/2, w: 25, h: 10 });
        }
    };

    function loop() {
        // Fondo
        ctx.fillStyle = "#4ec0ca";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (imagenes.fondo) ctx.drawImage(imagenes.fondo, 0, 0, canvas.width, canvas.height);

        if (activo) {
            velY += 0.35; neneY += velY;
            let velJuego = 2 + (dificultad * 0.5);

            // Tuberías
            if (frame % 150 === 0) {
                tuberias.push({ x: canvas.width, y: Math.random() * 200 + 100, h: 250, p: false });
            }
            tuberias.forEach((t, i) => {
                t.x -= velJuego;
                ctx.fillStyle = "green";
                ctx.fillRect(t.x, 0, 60, t.y);
                ctx.fillRect(t.x, t.y + t.h, 60, canvas.height);
                if (neneX + 50 > t.x && neneX + 10 < t.x + 60 && (neneY + 10 < t.y || neneY + 50 > t.y + t.h)) activo = false;
                if (!t.p && t.x < neneX) { t.p = true; score++; document.getElementById('puntos').innerText = "Puntos: " + score; }
            });

            if (neneY > canvas.height || neneY < 0) activo = false;
            frame++;
        }

        // Personaje
        if (inicioFase === 2) {
            let img = (neneActual === "Iván") ? imagenes.ivan : imagenes.pedro;
            if (img) ctx.drawImage(img, neneX, neneY, neneSize, neneSize);
        }

        if(!activo && inicioFase === 2) {
            // Si muere, resetamos música y volvemos al menú
            musicaFondo.pause();
            menu.style.display = 'flex';
            document.getElementById('btnDefault').focus();
        }

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
