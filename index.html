<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Super Iván y Pedro - TV Edition FULL + DRAMA</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #game-container { position: relative; width: 400px; height: 600px; background: #4ec0ca; overflow: hidden;}
        canvas { border: 4px solid #fff; width: 100%; height: 100%; display: block; }
        
        #pantallaInicio { position: absolute; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border: 4px solid #fff; }
        #pantallaInicio img { width: 100%; height: 100%; object-fit: contain; }
        #loading-text { position: absolute; bottom: 30px; color: white; font-size: 16px; text-shadow: 2px 2px #000; }

        #menu { position: absolute; background: rgba(0,0,0,0.9); width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; border: 4px solid #fff; top:0; left:0; }
        
        /* CARTEL DE MUERTE */
        #cartelUpss { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; color: #ffeb3b; z-index: 50; text-align: center; pointer-events: none; top:0; left:0; }
        .upss-texto { font-size: 60px; text-shadow: 5px 5px #f00; }

        .btn { background: #444; color: white; border: 3px solid #fff; padding: 12px; margin: 8px; cursor: pointer; font-size: 18px; width: 220px; font-family: 'Arial Black'; }
        .btn:focus { background: #fff; color: #000; outline: none; transform: scale(1.1); }

        #ui { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5; color: white; text-align: center; }
        #puntos { font-size: 24px; margin-top: 20px; text-shadow: 2px 2px #000; }
        #vidas-container { position: absolute; top: 15px; left: 15px; display: flex; gap: 5px; }
        .corazon { font-size: 28px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="pantallaInicio" onclick="quitarInicio()">
            <img src="inicio.jpg">
            <div id="loading-text">CARGANDO RECURSOS...</div>
        </div>

        <div id="menu">
            <h1 id="tituloMenu" style="text-align:center">¡A VOLAR!</h1>
            <button class="btn" id="btnDefault" onclick="iniciar(1)" style="color:#4caf50">NOOB</button>
            <button class="btn" onclick="iniciar(2)" style="color:#2196f3">PRO</button>
            <button class="btn" onclick="iniciar(3)" style="color:#9c27b0">HACKER</button>
            <button class="btn" onclick="iniciar(4)" style="color:#ff5252">GOD</button>
        </div>

        <div id="cartelUpss">
            <div class="upss-texto">¡Upss!</div>
            <div style="font-size: 20px; color: white;">intentá de vuelta...</div>
        </div>

        <div id="ui">
            <h2 id="puntos">Puntos: 0</h2>
            <div id="vidas-container">
                <span id="v1" class="corazon">❤️</span>
                <span id="v2" class="corazon">❤️</span>
                <span id="v3" class="corazon">❤️</span>
            </div>
        </div>
        <canvas id="juego"></canvas>
    </div>

<script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    const pantallaInicio = document.getElementById('pantallaInicio');
    const cartelUpss = document.getElementById('cartelUpss');
    const loadingText = document.getElementById('loading-text');

    canvas.width = 400; canvas.height = 600;

    // --- RECURSOS ---
    const imagenes = {};
    const nombresImg = ['ivan.png', 'pedro.png', 'fondo.jpg', 'nave.png'];
    let cargadas = 0;
    let listoParaJugar = false;

    nombresImg.forEach(nombre => {
        const img = new Image();
        img.src = nombre;
        img.onload = () => {
            cargadas++;
            if(cargadas === nombresImg.length) {
                listoParaJugar = true;
                loadingText.innerText = "¡LISTO! PRESIONÁ OK / ENTER";
                loadingText.style.color = "#4caf50";
            }
        };
        imagenes[nombre.split('.')[0]] = img;
    });

    const musicaInicio = new Audio('musica inicio.mp3'); musicaInicio.loop = true;
    const musicaFondo = new Audio('musica.mp3'); musicaFondo.loop = true;
    const sonidoMuerte = new Audio('muerte.mp3'); 

    let activo = false, inicioFase = 0;
    let neneX = 50, neneY = 300, neneSize = 70, velY = 0;
    let score = 0, frame = 0, vidas = 3, invulnerable = 0;
    let neneActual = "Iván", dificultad = 1;
    let tuberias = [], navesEnemigas = [], lasers = [], fragmentos = [];

    function fadeAudio(audio, target, duration) {
        let step = 0.05;
        let interval = setInterval(() => {
            if (audio.volume < target) audio.volume = Math.min(target, audio.volume + step);
            else audio.volume = Math.max(target, audio.volume - step);
            if (Math.abs(audio.volume - target) < 0.01) {
                clearInterval(interval);
                if (target === 0) audio.pause();
            }
        }, duration / 20);
    }

    function actualizarVidasUI() {
        for(let i=1; i<=3; i++) {
            document.getElementById('v' + i).innerText = (i <= vidas) ? "❤️" : "🖤";
        }
    }

    function quitarInicio() {
        if (!listoParaJugar) return;
        if (inicioFase === 0) {
            musicaInicio.volume = 0; musicaInicio.play().catch(()=>{});
            fadeAudio(musicaInicio, 1, 1000);
            inicioFase = 1;
        } else if (inicioFase === 1) {
            pantallaInicio.style.display = 'none';
            menu.style.display = 'flex';
            document.getElementById('btnDefault').focus();
            inicioFase = 2;
        }
    }

    function iniciar(nivel) {
        dificultad = nivel;
        menu.style.display = 'none';
        cartelUpss.style.display = 'none';
        fadeAudio(musicaInicio, 0, 800);
        setTimeout(() => {
            musicaFondo.currentTime = 0;
            musicaFondo.volume = 0; musicaFondo.play().catch(()=>{});
            fadeAudio(musicaFondo, 1, 800);
        }, 200);

        vidas = 3; score = 0; frame = 0; neneY = 300; velY = 0;
        tuberias = []; navesEnemigas = []; lasers = []; fragmentos = [];
        actualizarVidasUI();
        document.getElementById('puntos').innerText = "Puntos: 0";
        activo = true;
    }

    function chocar() {
        if (invulnerable > 0) return;
        vidas--;
        actualizarVidasUI();
        if (vidas <= 0) {
            morirDefinitivo();
        } else {
            invulnerable = 100;
            velY = -5;
        }
    }

    function morirDefinitivo() {
        activo = false;
        fadeAudio(musicaFondo, 0, 500);
        
        // Mostrar cartel Upss y sonar música de muerte
        cartelUpss.style.display = 'flex';
        sonidoMuerte.play().catch(() => {});

        sonidoMuerte.onended = () => {
            cartelUpss.style.display = 'none';
            neneActual = (neneActual === "Iván") ? "Pedro" : "Iván";
            document.getElementById('tituloMenu').innerHTML = "TURNO DE:<br>" + neneActual.toUpperCase();
            menu.style.display = 'flex';
            document.getElementById('btnDefault').focus();
            
            musicaInicio.currentTime = 0;
            musicaInicio.play().catch(()=>{}); 
            fadeAudio(musicaInicio, 1, 800);
        };
    }

    window.onkeydown = (e) => {
        if (inicioFase < 2) { quitarInicio(); return; }
        if (e.key === 'ArrowUp' || e.keyCode === 38 || e.code === 'Space') { if(activo) velY = -7.2; }
        if (e.key === 'Enter' || e.keyCode === 13) {
            if (activo) lasers.push({ x: neneX + neneSize, y: neneY + neneSize/2, w: 20, h: 8 });
        }
    };

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (imagenes.fondo) ctx.drawImage(imagenes.fondo, 0, 0, canvas.width, canvas.height);

        if (activo) {
            velY += 0.35; neneY += velY;
            if (invulnerable > 0) invulnerable--;
            let v = 2 + (dificultad * 0.6);

            if (frame % 140 === 0) tuberias.push({ x: canvas.width, y: Math.random()*250+50, h: 280 - (dificultad*20), p: false });
            tuberias.forEach((t, i) => {
                t.x -= v;
                ctx.fillStyle = "#73bf2e";
                ctx.fillRect(t.x, 0, 60, t.y);
                ctx.fillRect(t.x, t.y + t.h, 60, canvas.height);
                if (neneX+neneSize-15 > t.x && neneX+15 < t.x+60 && (neneY+15 < t.y || neneY+neneSize-15 > t.y+t.h)) chocar();
                if (!t.p && t.x < neneX) { t.p = true; score++; document.getElementById('puntos').innerText = "Puntos: " + score; }
                if (t.x < -70) tuberias.splice(i, 1);
            });

            if (score > 3 && frame % 120 === 0 && Math.random() > 0.5) navesEnemigas.push({ x: canvas.width, y: Math.random()*500, w: 60, h: 40 });
            navesEnemigas.forEach((n, i) => {
                n.x -= (v + 1);
                if (imagenes.nave) ctx.drawImage(imagenes.nave, n.x, n.y, n.w, n.h);
                if (neneX+neneSize-20 > n.x && neneX+20 < n.x+n.w && neneY+20 < n.y+n.h && neneY+neneSize-20 > n.y) chocar();
                if (n.x < -100) navesEnemigas.splice(i, 1);
            });

            lasers.forEach((l, li) => {
                l.x += 10;
                ctx.fillStyle = "red"; ctx.fillRect(l.x, l.y, l.w, l.h);
                navesEnemigas.forEach((n, ni) => {
                    if (l.x < n.x + n.w && l.x + l.w > n.x && l.y > n.y && l.y < n.y + n.h) {
                        for(let k=0; k<10; k++) fragmentos.push({x: n.x, y: n.y, vx: Math.random()*6-3, vy: Math.random()*6-3, v:1});
                        navesEnemigas.splice(ni, 1); lasers.splice(li, 1);
                        score += 2; document.getElementById('puntos').innerText = "Puntos: " + score;
                    }
                });
                if (l.x > canvas.width) lasers.splice(li, 1);
            });

            fragmentos.forEach((f, i) => {
                f.x += f.vx; f.y += f.vy; f.v -= 0.02;
                ctx.fillStyle = `rgba(255,165,0,${f.v})`;
                ctx.fillRect(f.x, f.y, 4, 4);
                if(f.v <= 0) fragmentos.splice(i, 1);
            });

            if (neneY > canvas.height || neneY < 0) chocar();
            frame++;
        }

        if (inicioFase === 2 && (invulnerable % 10 < 5)) {
            let img = (neneActual === "Iván") ? imagenes.ivan : imagenes.pedro;
            if (img) ctx.drawImage(img, neneX, neneY, neneSize, neneSize);
        }

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
