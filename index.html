<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Iván, Pedro y Rambo - Récord Edition</title>
    <style>
        body { 
            margin: 0; background: #111; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; 
        }
        canvas { border: 2px solid #fff; background: #4ec0ca; max-width: 100vw; max-height: 100vh; object-fit: contain; }
        
        #ui { position: absolute; text-align: center; color: white; pointer-events: none; width: 100%; max-width: 400px; height: 100%; max-height: 600px; }
        
        #pantallaInicio { 
            position: absolute; width: 100%; max-width: 400px; height: 100%; max-height: 600px; 
            background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; border: 4px solid #fff;
        }
        #pantallaInicio img { width: 100%; height: 100%; object-fit: contain; }

        .menu-container { position: absolute; background: rgba(0,0,0,0.95); width: 100%; max-width: 400px; height: 100%; max-height: 600px; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; border: 4px solid #fff; }
        
        #cartelUpss { position: absolute; width: 100%; max-width: 400px; height: 100%; max-height: 600px; display: none; flex-direction: column; justify-content: center; align-items: center; color: #ffeb3b; z-index: 20; text-align: center; pointer-events: none; }
        .upss-texto { font-size: 50px; text-shadow: 5px 5px #f00; }
        .btn { background: #444; color: white; border: 3px solid #fff; padding: 15px; margin: 8px; cursor: pointer; font-family: 'Arial Black', sans-serif; font-size: 18px; width: 80%; transition: 0.2s; pointer-events: auto; -webkit-tap-highlight-color: transparent; }
        
        #vidas-container { position: absolute; top: 15px; left: 15px; display: flex; gap: 5px; pointer-events: none; z-index: 5; }
        .corazon { font-size: 24px; text-shadow: 2px 2px #000; }
        
        #marcador { position: absolute; top: 15px; right: 15px; text-align: right; pointer-events: none; }
        #puntos { font-size: 22px; text-shadow: 2px 2px #000; margin: 0; }
        #record-ui { font-size: 14px; color: #ffeb3b; text-shadow: 1px 1px #000; margin: 0; }

        #mensajeRecord {
            position: absolute; width: 100%; top: 40%; text-align: center;
            color: #ffeb3b; font-size: 35px; text-shadow: 4px 4px #f00;
            display: none; z-index: 30; pointer-events: none;
            animation: latido 0.5s infinite alternate;
        }
        @keyframes latido { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="pantallaInicio" onclick="quitarInicio()">
        <img src="inicio.jpg" alt="Super Iván, Pedro y Rambo">
    </div>

    <div id="menuPersonaje" class="menu-container">
        <h1>¿QUIÉN VUELA?</h1>
        <button class="btn" onclick="elegirPersonaje('Iván')">SUPER IVÁN</button>
        <button class="btn" onclick="elegirPersonaje('Pedro')">SUPER PEDRO</button>
        <button class="btn" onclick="elegirPersonaje('Rambo')">SUPER RAMBO</button>
    </div>

    <div id="menuDificultad" class="menu-container">
        <h1 id="tituloDificultad">NIVEL</h1>
        <button class="btn" onclick="iniciar(1)" style="color:#4caf50">NOOB</button>
        <button class="btn" onclick="iniciar(2)" style="color:#2196f3">PRO</button>
        <button class="btn" onclick="iniciar(3)" style="color:#9c27b0">HACKER</button>
        <button class="btn" onclick="iniciar(4)" style="color:#ff5252">GOD</button>
    </div>

    <div id="cartelUpss">
        <div class="upss-texto">¡Upss!</div>
        <div style="font-size: 20px; color: white;">intentá de vuelta...</div>
    </div>

    <div id="mensajeRecord">¡RÉCORD SUPERADO!</div>

    <div id="ui">
        <div id="marcador">
            <p id="puntos">Puntos: 0</p>
            <p id="record-ui">Record: 0</p>
        </div>
        <div id="vidas-container">
            <span id="v1" class="corazon">❤️</span>
            <span id="v2" class="corazon">❤️</span>
            <span id="v3" class="corazon">❤️</span>
        </div>
    </div>
    <canvas id="juego"></canvas>

<script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    const menuP = document.getElementById('menuPersonaje');
    const menuD = document.getElementById('menuDificultad');
    const pantallaInicio = document.getElementById('pantallaInicio');
    const msjRecord = document.getElementById('mensajeRecord');
    const puntosTxt = document.getElementById('puntos');
    const recordTxt = document.getElementById('record-ui');

    canvas.width = 400; canvas.height = 600;

    // --- IMÁGENES ---
    const imgIvan = new Image(); imgIvan.src = 'ivan.png';
    const imgPedro = new Image(); imgPedro.src = 'pedro.png';
    const imgRambo = new Image(); imgRambo.src = 'rambo.png';
    const imgFondo = new Image(); imgFondo.src = 'fondo.jpg';
    const imgTextura = new Image(); imgTextura.src = 'textura.png';
    const imgNave = new Image(); imgNave.src = 'nave.png'; 
    const imgKetchup = new Image(); imgKetchup.src = 'ketchup.png';
    const imgRayoIvan = new Image(); imgRayoIvan.src = 'rayo Ivan.jpg';
    const imgHuesito = new Image(); imgHuesito.src = 'huesito.png';

    // --- AUDIOS ---
    const musicaInicio = new Audio('musica inicio.mp3'); 
    const musicaFondo = new Audio('musica.mp3'); 
    const sonidoMuerte = new Audio('muerte.mp3'); 
    musicaInicio.loop = true; musicaFondo.loop = true;

    let neneX = 50, neneY = 300, neneSize = 70;
    let velY = 0, gravedad = 0.35, salto = -7.2;
    let score = 0, activo = false, frame = 0, inicioQuitado = false;
    let vidas = 3, invulnerable = 0, record = localStorage.getItem('highScore') || 0;
    let recordBatido = false;
    let tuberias = [], navesEnemigas = [], lasers = [], fragmentos = [], fireworks = [];
    let neneActual = "Iván";
    let patronTextura = null, dificultad = 1;

    recordTxt.innerText = "Record: " + record;

    function quitarInicio() {
        if (!inicioQuitado) {
            inicioQuitado = true;
            musicaInicio.play();
            pantallaInicio.style.display = 'none';
            menuP.style.display = 'flex';
        }
    }

    function elegirPersonaje(p) {
        neneActual = p;
        menuP.style.display = 'none';
        menuD.style.display = 'flex';
        document.getElementById('tituloDificultad').innerText = "NIVEL " + p.toUpperCase();
    }

    function iniciar(nivel) {
        musicaInicio.pause();
        musicaFondo.currentTime = 0;
        musicaFondo.play();
        dificultad = nivel;
        menuD.style.display = 'none';
        msjRecord.style.display = 'none';
        vidas = 3; invulnerable = 0; recordBatido = false;
        actualizarVidasUI();
        score = 0; frame = 0; neneY = 300; velY = 0;
        tuberias = []; navesEnemigas = []; lasers = []; fragmentos = []; fireworks = [];
        puntosTxt.innerText = "Puntos: 0";
        activo = true;
    }

    function disparar() {
        if (!activo) return;
        let imgP = imgHuesito; let wP = 30, hP = 30;
        if (neneActual === "Iván") { imgP = imgRayoIvan; wP = 60; hP = 20; }
        else if (neneActual === "Pedro") { imgP = imgKetchup; wP = 45; hP = 25; }
        lasers.push({ x: neneX + neneSize, y: neneY + neneSize/2 - hP/2, w: wP, h: hP, img: imgP });
    }

    window.addEventListener('touchstart', (e) => {
        if (!inicioQuitado) { quitarInicio(); return; }
        if (!activo) return;
        if (e.touches[0].clientX < window.innerWidth / 2) velY = salto; 
        else disparar();
        e.preventDefault();
    }, { passive: false });

    function actualizarVidasUI() {
        for(let i=1; i<=3; i++) document.getElementById('v' + i).innerText = (i <= vidas) ? "❤️" : "🖤";
    }

    function createFirework() {
        const x = Math.random() * canvas.width;
        const y = Math.random() * (canvas.height / 2);
        const colors = ['#ff0', '#f0f', '#0ff', '#f00', '#0f0'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        for (let i = 0; i < 30; i++) {
            fireworks.push({
                x, y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                life: 1.0,
                color
            });
        }
    }

    function loop() {
        if (imgTextura.complete && !patronTextura) patronTextura = ctx.createPattern(imgTextura, 'repeat');
        ctx.fillStyle = "#4ec0ca";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (imgFondo.complete) ctx.drawImage(imgFondo, 0, 0, canvas.width, canvas.height);

        if (activo) {
            velY += gravedad; neneY += velY;
            if (invulnerable > 0) invulnerable--;
            let velJuego = 1.8 + (dificultad * 0.6); 

            if (frame % Math.floor(160 - (dificultad * 15)) === 0) {
                let h = 300 - (dificultad * 35);
                tuberias.push({ x: canvas.width, y: Math.random() * (canvas.height - h - 100) + 50, h: h, p: false });
            }

            if (score >= 5 && frame % 110 === 0 && Math.random() > 0.4) {
                navesEnemigas.push({ x: canvas.width, y: Math.random()*500+50, w: 75, h: 45, velX: velJuego + dificultad });
            }

            lasers.forEach((l, li) => {
                l.x += 10;
                if (l.img.complete) ctx.drawImage(l.img, l.x, l.y, l.w, l.h);
                navesEnemigas.forEach((n, ni) => {
                    if (l.x < n.x + n.w && l.x + l.w > n.x && l.y + l.h > n.y && l.y < n.y + n.h) {
                        navesEnemigas.splice(ni, 1); lasers.splice(li, 1);
                        score += 2; checkRecord();
                    }
                });
            });

            tuberias.forEach((t, ti) => {
                t.x -= velJuego;
                ctx.fillStyle = patronTextura || "#73bf2e";
                ctx.fillRect(t.x, 0, 65, t.y); ctx.fillRect(t.x, t.y + t.h, 65, canvas.height);
                if (neneX+50 > t.x && neneX+20 < t.x+65 && (neneY+20 < t.y || neneY+50 > t.y+t.h)) {
                    if(invulnerable<=0){ vidas--; invulnerable=120; if(vidas<=0) { activo=false; sonidoMuerte.play(); menuP.style.display='flex'; } else actualizarVidasUI(); }
                }
                if (!t.p && t.x < neneX) { t.p = true; score++; checkRecord(); }
            });

            if (neneY > canvas.height || neneY < 0) { activo=false; sonidoMuerte.play(); menuP.style.display='flex'; }
            frame++;
        }

        fireworks.forEach((f, fi) => {
            f.x += f.vx; f.y += f.vy; f.life -= 0.015;
            if (f.life <= 0) fireworks.splice(fi, 1);
            else { ctx.globalAlpha = f.life; ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, 3, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; }
        });

        if (inicioQuitado && invulnerable % 10 < 5) {
            let img = (neneActual === "Iván") ? imgIvan : (neneActual === "Pedro" ? imgPedro : imgRambo);
            ctx.drawImage(img, neneX, neneY, neneSize, neneSize);
        }
        requestAnimationFrame(loop);
    }

    function checkRecord() {
        puntosTxt.innerText = "Puntos: " + score;
        if (score > record) {
            record = score;
            localStorage.setItem('highScore', record);
            recordTxt.innerText = "Record: " + record;
            if (!recordBatido) {
                recordBatido = true;
                msjRecord.style.display = 'block';
                createFirework(); createFirework();
                setTimeout(() => msjRecord.style.display = 'none', 3000);
            }
            if (score % 5 === 0) createFirework();
        }
    }
    loop();
</script>
</body>
</html>
