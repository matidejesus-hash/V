<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Iván, Pedro y Rambo - Space Race ULTRA Mobile</title>
    <style>
        /* Ajuste para que el canvas ocupe el máximo espacio posible sin deformarse */
        body { 
            margin: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Arial Black', sans-serif;
            touch-action: none; /* Desactiva gestos del navegador como swipe-to-refresh */
        }
        canvas { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            background: #4ec0ca; 
            border: 2px solid #fff;
        }
        
        /* Contenedores de UI escalables */
        #ui, #pantallaInicio, .menu-container, #cartelUpss, #cartelRecord {
            position: absolute;
            width: 400px;
            height: 600px;
            pointer-events: none;
        }

        #pantallaInicio, .menu-container { pointer-events: auto; }

        .btn { 
            background: #444; color: white; border: 3px solid #fff; 
            padding: 15px; margin: 8px; cursor: pointer; 
            font-size: 18px; width: 250px; pointer-events: auto;
            -webkit-tap-highlight-color: transparent; /* Quita el recuadro azul en Android */
        }

        /* Área de control táctil invisible */
        #controles-movil {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            z-index: 50;
            pointer-events: none;
        }
        .zona-touch {
            flex: 1;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <div id="pantallaInicio" onclick="quitarInicio()">
        <img src="inicio.jpg" alt="Inicio" style="width:100%; height:100%;">
    </div>

    <div id="controles-movil">
        <div class="zona-touch" id="touch-salto"></div>
        <div class="zona-touch" id="touch-disparo"></div>
    </div>

    <div id="menuPersonaje" class="menu-container">
        <h1>¿QUIÉN VUELA?</h1>
        <button class="btn" onclick="elegirPersonaje('Iván')">SUPER IVÁN</button>
        <button class="btn" onclick="elegirPersonaje('Pedro')">SUPER PEDRO</button>
        <button class="btn" onclick="elegirPersonaje('Rambo')">SUPER RAMBO</button>
    </div>

    <div id="menuDificultad" class="menu-container">
        <h1 id="tituloDificultad">NIVEL</h1>
        <button class="btn" onclick="iniciar(1)">NOOB</button>
        <button class="btn" onclick="iniciar(2)">PRO</button>
        <button class="btn" onclick="iniciar(3)">HACKER</button>
        <button class="btn" onclick="iniciar(4)">GOD</button>
    </div>

    <div id="ui">
        <div id="puntos-box">
            <h2 id="puntos" style="color:white; position:absolute; right:10px; top:10px;">Puntos: 0</h2>
        </div>
        <div id="vidas-container" style="position:absolute; left:10px; top:10px;">
            <span id="v1">❤️</span><span id="v2">❤️</span><span id="v3">❤️</span>
        </div>
    </div>

    <canvas id="juego"></canvas>

<script>
    // ... (Mantén todas tus variables y carga de imágenes igual que en tu código original) ...
    // [Se asume que el resto de las variables como neneX, neneY, etc., están presentes]

    // --- NUEVA LÓGICA TÁCTIL ---
    const zonaSalto = document.getElementById('touch-salto');
    const zonaDisparo = document.getElementById('touch-disparo');

    // Función para manejar el inicio de audio (Android requiere interacción)
    function desbloquearAudio() {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // Saltar con el lado izquierdo
    zonaSalto.addEventListener('touchstart', (e) => {
        e.preventDefault();
        desbloquearAudio();
        if (!activo) return;
        saltar();
    }, {passive: false});

    // Disparar con el lado derecho
    zonaDisparo.addEventListener('touchstart', (e) => {
        e.preventDefault();
        desbloquearAudio();
        if (!activo) return;
        disparar();
    }, {passive: false});

    // Adaptación de tamaño para tablets
    function ajustarPantalla() {
        const escala = Math.min(window.innerWidth / 400, window.innerHeight / 600);
        const uis = document.querySelectorAll('#ui, #pantallaInicio, .menu-container, #cartelUpss, #cartelRecord');
        uis.forEach(el => {
            el.style.transform = `scale(${escala})`;
        });
    }

    window.addEventListener('resize', ajustarPantalla);
    ajustarPantalla();

    // ... (El resto de tu función loop() y lógica de colisiones se mantiene igual) ...

</script>
</body>
</html>
