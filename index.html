<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Iván, Pedro y Rambo - Space Race ULTRA Mobile</title>
    <style>
        /* Ajuste para que el canvas sea responsivo */
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; }
        canvas { 
            border: 4px solid #fff; 
            background: #4ec0ca; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #ui { position: absolute; text-align: center; color: white; pointer-events: none; width: 400px; height: 600px; }
        #pantallaInicio { position: absolute; width: 400px; height: 600px; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 4px solid #fff; max-width: 100%; max-height: 100%; }
        #pantallaInicio img { width: 100%; height: 100%; object-fit: contain; }
        .menu-container { position: absolute; background: rgba(0,0,0,0.95); width: 400px; height: 600px; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; border: 4px solid #fff; max-width: 100%; max-height: 100%; }
        #cartelUpss { position: absolute; width: 400px; height: 600px; display: none; flex-direction: column; justify-content: center; align-items: center; color: #ffeb3b; z-index: 20; text-align: center; pointer-events: none; }
        .upss-texto { font-size: 50px; text-shadow: 5px 5px #f00; }
        #cartelRecord { position: absolute; width: 400px; height: 600px; display: none; flex-direction: column; justify-content: center; align-items: center; color: #00ff00; z-index: 25; text-align: center; pointer-events: none; animation: flash 0.5s infinite alternate; }
        @keyframes flash { from { opacity: 1; transform: scale(1); } to { opacity: 0.7; transform: scale(1.1); } }
        .btn { background: #444; color: white; border: 3px solid #fff; padding: 12px; margin: 8px; cursor: pointer; font-family: 'Arial Black', sans-serif; font-size: 16px; width: 220px; transition: 0.2s; pointer-events: auto; }
        #vidas-container { position: absolute; top: 15px; left: 15px; display: flex; gap: 5px; pointer-events: none; z-index: 5; }
        .corazon { font-size: 28px; text-shadow: 3px 3px #000; }
        #jugador { font-size: 30px; text-shadow: 3px 3px #000; margin-top: 20px; opacity: 0; transition: 0.5s; }
        #puntos-box { position: absolute; top: 15px; right: 15px; text-align: right; }
        #puntos { font-size: 24px; text-shadow: 2px 2px #000; margin: 0; }
        #record { font-size: 16px; color: #ffeb3b; text-shadow: 1px 1px #000; margin: 0; }
        #timer-especial { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 18px; padding: 5px 15px; border-radius: 20px; display: none; font-weight: bold; text-shadow: 2px 2px #000; border: 2px solid #fff; z-index: 30; }
    </style>
</head>
<body>

    <div id="pantallaInicio" onclick="quitarInicio()">
        <img src="inicio.jpg" alt="Super Iván, Pedro y Rambo Space Race">
    </div>

    <div id="menuPersonaje" class="menu-container">
        <h1>¿QUIÉN VUELA?</h1>
        <button class="btn" onclick="elegirPersonaje('Iván')">SUPER IVÁN</button>
        <button class="btn" onclick="elegirPersonaje('Pedro')">SUPER PEDRO</button>
        <button class="btn" onclick="elegirPersonaje('Rambo')">SUPER RAMBO</button>
        <button class="btn" onclick="resetRecord()" style="background:#f44336; font-size: 12px; width: 150px; margin-top: 20px;">RESETEAR RECORD</button>
    </div>

    <div id="menuDificultad" class="menu-container">
        <h1 id="tituloDificultad">NIVEL</h1>
        <button class="btn" onclick="iniciar(1)" style="color:#4caf50">NOOB</button>
        <button class="btn" onclick="iniciar(2)" style="color:#2196f3">PRO</button>
        <button class="btn" onclick="iniciar(3)" style="color:#9c27b0">HACKER</button>
        <button class="btn" onclick="iniciar(4)" style="color:#ff5252">GOD</button>
    </div>

    <div id="cartelUpss">
        <div class="upss-texto">¡Upss!</div>
        <div style="font-size: 20px; color: white;">intentá de vuelta...</div>
    </div>

    <div id="cartelRecord">
        <div style="font-size: 40px; text-shadow: 3px 3px #000;">¡RECORD SUPERADO!</div>
    </div>

    <div id="timer-especial"></div>

    <div id="ui">
        <h1 id="jugador">¡A VOLAR!</h1>
        <div id="puntos-box">
            <h2 id="puntos">Puntos: 0</h2>
            <h3 id="record">Record: 0</h3>
        </div>
        <div id="vidas-container">
            <span id="v1" class="corazon">❤️</span>
            <span id="v2" class="corazon">❤️</span>
            <span id="v3" class="corazon">❤️</span>
        </div>
    </div>
    <canvas id="juego"></canvas>

<script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    const menuPersonaje = document.getElementById('menuPersonaje');
    const menuDificultad = document.getElementById('menuDificultad');
    const pantallaInicio = document.getElementById('pantallaInicio');
    const cartelUpss = document.getElementById('cartelUpss');
    const cartelRecord = document.getElementById('cartelRecord');
    const jugadorTxt = document.getElementById('jugador');
    const puntosTxt = document.getElementById('puntos');
    const recordTxt = document.getElementById('record');
    const timerUI = document.getElementById('timer-especial');

    canvas.width = 400; canvas.height = 600;

    // --- ASSETS ---
    const imgIvan = new Image(); imgIvan.src = 'ivan.png';
    const imgPedro = new Image(); imgPedro.src = 'pedro.png';
    const imgRambo = new Image(); imgRambo.src = 'rambo.png';
    const imgHuesito = new Image(); imgHuesito.src = 'huesito.png';
    const imgRayo = new Image(); imgRayo.src = 'rayo Ivan.png'; 
    const imgKetchup = new Image(); imgKetchup.src = 'ketchup.png'; 
    const imgFondo = new Image(); imgFondo.src = 'fondo.jpg';
    const imgTextura = new Image(); imgTextura.src = 'textura.png';
    const imgNave = new Image(); imgNave.src = 'nave.png'; 
    const imgBota = new Image(); imgBota.src = 'bota.png';
    const imgKit = new Image(); imgKit.src = 'kit.png';
    const imgNitro = new Image(); imgNitro.src = 'nitro.png';
    const imgJefe = new Image(); imgJefe.src = 'jefe1.png';

    const musicaInicio = new Audio('musica inicio.mp3'); 
    const musicaFondo = new Audio('musica.mp3'); 
    const sonidoMuerte = new Audio('muerte.mp3'); 
    const sonidoVictoria = new Audio('victoria.mp3'); 
    const sonidoLadrido = new Audio('ladrido.mp3');
    musicaInicio.loop = true; musicaFondo.loop = true;

    let neneX = 50, neneY = 300, neneSize = 70;
    let velY = 0, gravedad = 0.35, salto = -7.2;
    let score = 0, activo = false, frame = 0, inicioQuitado = false;
    let highscore = localStorage.getItem('hs_space_race') || 0;
    let recordAlcanzado = false, yaFestejoRecord = false;
    let vidas = 3, invulnerable = 0, timerPoder = 0, timerNitro = 0;
    let tuberias = [], navesEnemigas = [], lasers = [], fragmentos = [], textosBoom = [], fuegos = [], items = [], estelaNitro = [];
    let neneActual = "Iván", dificultad = 1, patronTextura = null, wPresionada = false;
    let fadeNegro = 0;

    let jefe = { activo: false, x: 450, y: 200, w: 180, h: 140, hp: 10, maxHp: 10, dirY: 1, velY: 2, timerDisparo: 0, balas: [], vencido: false, muriendo: false, timerMuerte: 0 };

    recordTxt.innerText = "Record: " + highscore;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(f, t, type="sine", vol=0.05) {
        if(audioCtx.state === 'suspended') return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type; o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; g.gain.value = vol;
        o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + t);
        o.stop(audioCtx.currentTime + t);
    }

    function sonidoNitro() {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = "sawtooth";
        o.frequency.setValueAtTime(80, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 1.0);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 1.0);
    }

    function fadeAudio(audio, targetVolume, duration, callback) {
        const startVolume = audio.volume;
        const diff = targetVolume - startVolume;
        const steps = 20;
        const interval = setInterval(() => {
            audio.volume = Math.max(0, Math.min(1, audio.volume + (diff / steps)));
            if (Math.abs(audio.volume - targetVolume) < 0.05) {
                clearInterval(interval);
                audio.volume = targetVolume;
                if (targetVolume === 0) audio.pause();
                if (callback) callback();
            }
        }, duration / steps);
    }

    function quitarInicio() {
        if (!inicioQuitado) {
            inicioQuitado = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            musicaInicio.volume = 0; musicaInicio.play();
            fadeAudio(musicaInicio, 1, 1000);
            pantallaInicio.style.display = 'none';
            menuPersonaje.style.display = 'flex';
        }
    }

    function elegirPersonaje(nombre) {
        neneActual = nombre;
        menuPersonaje.style.display = 'none';
        menuDificultad.style.display = 'flex';
        document.getElementById('tituloDificultad').innerText = "NIVEL PARA " + nombre.toUpperCase();
    }

    function iniciar(nivel) {
        fadeAudio(musicaInicio, 0, 800, () => { musicaInicio.currentTime = 0; });
        setTimeout(() => { musicaFondo.volume = 0; musicaFondo.play(); fadeAudio(musicaFondo, 1, 800); }, 200);
        dificultad = nivel;
        menuDificultad.style.display = 'none';
        cartelUpss.style.display = 'none'; cartelRecord.style.display = 'none'; timerUI.style.display = 'none';
        vidas = 3; invulnerable = 0; timerPoder = 0; timerNitro = 0; recordAlcanzado = false; yaFestejoRecord = false;
        fadeNegro = 0; actualizarVidasUI();
        score = 0; frame = 0; neneY = 300; velY = 0;
        tuberias = []; navesEnemigas = []; lasers = []; fragmentos = []; textosBoom = []; fuegos = []; items = []; estelaNitro = [];
        jefe.activo = false; jefe.vencido = false; jefe.muriendo = false; jefe.x = 450;
        jefe.maxHp = [0, 5, 10, 20, 40][nivel]; jefe.hp = jefe.maxHp; jefe.balas = [];
        puntosTxt.innerText = "Puntos: 0";
        jugadorTxt.innerText = "JUEGA: " + neneActual.toUpperCase();
        jugadorTxt.style.opacity = '1';
        activo = true;
        setTimeout(() => { if(activo) jugadorTxt.style.opacity = '0'; }, 2000);
    }

    function regresarAlMenu() {
        activo = false;
        fadeAudio(musicaFondo, 0, 1000, () => { musicaFondo.currentTime = 0; });
        pantallaInicio.style.display = 'flex';
        menuPersonaje.style.display = 'none'; menuDificultad.style.display = 'none'; inicioQuitado = false;
    }

    function crearFuegoArtificial(x, y) {
        const colores = ['#ff0', '#f0f', '#0ff', '#f00', '#fff', '#0f0'];
        const color = colores[Math.floor(Math.random() * colores.length)];
        for(let i=0; i<30; i++) fuegos.push({ x: x, y: y, vx: (Math.random()-0.5) * 10, vy: (Math.random()-0.5) * 10, vida: 1, color: color });
    }

    function actualizarVidasUI() {
        for(let i=1; i<=3; i++) document.getElementById('v' + i).innerText = (i <= vidas) ? "❤️" : "🖤";
    }

    function saltar() { if (activo && !jefe.muriendo) { velY = salto; beep(450, 0.1); } }
    
    function disparar() {
        if (!activo || jefe.muriendo) return;
        if (neneActual === "Rambo") { sonidoLadrido.currentTime = 0; sonidoLadrido.play().catch(()=>{}); } 
        else { beep(1200, 0.1, "square", 0.03); }
        let imgP = imgHuesito, wP = 35, hP = 35;
        if (neneActual === "Iván") { imgP = imgRayo; wP = 40; hP = 4; }
        else if (neneActual === "Pedro") { imgP = imgKetchup, wP = 50, hP = 25; }
        lasers.push({ x: neneX + neneSize, y: neneY + neneSize/2, w: wP, h: hP, rot: 0, img: imgP });
    }

    // --- CONTROLES ADAPTADOS (PC + MÓVIL) ---
    window.onkeydown = (e) => { 
        if (!inicioQuitado) { quitarInicio(); return; }
        if(e.code === 'Space') saltar(); 
        if(e.code === 'KeyW' && !wPresionada) { disparar(); wPresionada = true; }
    };
    window.onkeyup = (e) => { if(e.code === 'KeyW') wPresionada = false; };
    
    // Soporte táctil
    window.addEventListener('touchstart', (e) => {
        if (!inicioQuitado) { quitarInicio(); return; }
        const touchX = e.touches[0].clientX;
        // Si toca la mitad izquierda salta, mitad derecha dispara
        if (touchX < window.innerWidth / 2) saltar();
        else disparar();
        e.preventDefault();
    }, { passive: false });

    window.onmousedown = (e) => { 
        if (!inicioQuitado) { quitarInicio(); return; }
        if (e.button === 0) saltar(); 
        if (e.button === 2) disparar(); 
    };
    window.oncontextmenu = (e) => e.preventDefault();

    function sumarPunto(cantidad) {
        score += cantidad; puntosTxt.innerText = "Puntos: " + score;
        if (score > highscore) {
            if (!yaFestejoRecord && highscore > 0) {
                yaFestejoRecord = true; recordAlcanzado = true;
                cartelRecord.style.display = 'flex'; crearFuegoArtificial(neneX + neneSize, neneY + neneSize/2);
                beep(800, 0.2, "sine", 0.1);
                setTimeout(() => { cartelRecord.style.display = 'none'; }, 2000);
                setTimeout(() => { recordAlcanzado = false; }, 3000);
            }
            highscore = score; localStorage.setItem('hs_space_race', highscore); recordTxt.innerText = "Record: " + highscore;
        }
    }

    function chocar() {
        if (invulnerable > 0 || timerPoder > 0 || timerNitro > 0 || jefe.muriendo) return;
        vidas--; actualizarVidasUI(); beep(150, 0.5, "sawtooth", 0.1);
        if (vidas <= 0) { activo = false; morirDefinitivo(); } else { invulnerable = 120; velY = salto; }
    }

    function morirDefinitivo() {
        fadeAudio(musicaFondo, 0, 500, () => { musicaFondo.currentTime = 0; });
        cartelUpss.style.display = 'flex'; sonidoMuerte.play().catch(()=>{});
        sonidoMuerte.onended = () => {
            cartelUpss.style.display = 'none'; pantallaInicio.style.display = 'flex'; menuPersonaje.style.display = 'none'; inicioQuitado = false;
        };
    }

    function loop() {
        if (imgTextura.complete && !patronTextura) patronTextura = ctx.createPattern(imgTextura, 'repeat');
        ctx.fillStyle = "#4ec0ca"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (imgFondo.complete) ctx.drawImage(imgFondo, 0, 0, canvas.width, canvas.height);

        if (activo) {
            if (!jefe.muriendo) { velY += gravedad; neneY += velY; }
            if (invulnerable > 0) invulnerable--;
            
            let multNitro = (timerNitro > 0) ? 5.0 : 1.0; 
            let velGlobal = (1.8 + (dificultad * 0.7)) * multNitro;

            if (timerNitro > 0) {
                timerNitro--; 
                timerUI.style.display = 'block'; timerUI.style.background = "rgba(255,0,0,0.9)";
                timerUI.innerText = "⚡ MODO DIOS: " + Math.ceil(timerNitro/60) + "s";
                for(let i=0; i<8; i++) {
                    estelaNitro.push({ 
                        x: neneX, y: neneY + 20 + Math.random()*30, 
                        vx: -20 - Math.random()*20, vy: (Math.random()-0.5)*10, 
                        vida: 1.0, size: Math.random()*25+10, 
                        col: ['#ffffff','#00ffff','#ff00ff','#ff0000'][Math.floor(Math.random()*4)] 
                    });
                }
            } else if (timerPoder > 0) {
                timerPoder--; timerUI.style.display = 'block'; timerUI.style.background = "rgba(0,0,255,0.7)";
                timerUI.innerText = "💪 LECHE: " + Math.ceil(timerPoder/60) + "s";
            } else { timerUI.style.display = 'none'; }

            if (!jefe.activo && frame % 600 === 0 && Math.random() > 0.4) {
                let r = Math.random();
                let tipo = r < 0.50 ? "nitro" : (r < 0.75 ? "bota" : "kit");
                items.push({ x: canvas.width, y: 100 + Math.random()*400, w: 45, h: 45, tipo: tipo });
            }
            if (!jefe.activo && frame < 3600) {
                if (frame % Math.floor(160 - (dificultad * 15)) === 0) tuberias.push({ x: canvas.width, y: Math.random()*(canvas.height-350)+50, h: (300-(dificultad*35)), p: false });
                if (score >= 5 && frame % 110 === 0 && Math.random() > (0.6 - dificultad*0.1)) {
                    navesEnemigas.push({ x: canvas.width, y: Math.random()*500 + 50, w: 75, h: 45, extraVel: 1.5 + dificultad });
                }
            } else if (!jefe.vencido && tuberias.length === 0 && navesEnemigas.length === 0) { jefe.activo = true; }

            estelaNitro.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vida -= 0.05;
                if (p.vida <= 0) estelaNitro.splice(i, 1);
                else { ctx.globalAlpha = p.vida; ctx.fillStyle = p.col; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.vida, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; }
            });

            tuberias.forEach((t, ti) => {
                t.x -= velGlobal;
                if (patronTextura) { let m = new DOMMatrix().translate(t.x, 0); patronTextura.setTransform(m); ctx.fillStyle = patronTextura; } else { ctx.fillStyle = "#73bf2e"; }
                ctx.fillRect(t.x, 0, 65, t.y); ctx.fillRect(t.x, t.y + t.h, 65, canvas.height);
                if (neneX+neneSize-20 > t.x && neneX+20 < t.x+65 && (neneY+20 < t.y || neneY+neneSize-20 > t.y+t.h)) chocar();
                if (!t.p && t.x < neneX) { t.p = true; sumarPunto(1); }
                if (t.x < -70) tuberias.splice(ti, 1);
            });

            navesEnemigas.forEach((n, ni) => {
                n.x -= (velGlobal + (n.extraVel * multNitro)); 
                if (imgNave.complete) ctx.drawImage(imgNave, n.x, n.y, n.w, n.h);
                if (neneX+neneSize-25 > n.x && neneX+25 < n.x+n.w && neneY+25 < n.y+n.h && neneY+neneSize-25 > n.y) chocar();
                if (n.x < -120) navesEnemigas.splice(ni, 1);
            });

            items.forEach((it, idx) => {
                it.x -= velGlobal;
                let osc = Math.sin(frame * 0.1) * 10;
                let img = it.tipo === "bota" ? imgBota : (it.tipo === "kit" ? imgKit : imgNitro);
                if (img.complete) ctx.drawImage(img, it.x, it.y + osc, it.w, it.h);
                if (neneX < it.x + it.w && neneX + neneSize > it.x && neneY < it.y + osc + it.h && neneY + neneSize > it.y + osc) {
                    if (it.tipo === "kit") { vidas = 3; actualizarVidasUI(); beep(800, 0.4); }
                    else if (it.tipo === "nitro") { timerNitro = 420; sonidoNitro(); }
                    else { timerPoder = 720; beep(1000, 0.4); }
                    items.splice(idx, 1);
                }
            });

            if (jefe.activo) {
                if (!jefe.muriendo) {
                    if (jefe.x > 200) jefe.x -= 2; jefe.y += jefe.velY * jefe.dirY;
                    if (jefe.y <= 20 || jefe.y >= 440) jefe.dirY *= -1;
                    jefe.timerDisparo++;
                    if (jefe.timerDisparo > (100 / dificultad)) { jefe.balas.push({ x: jefe.x, y: jefe.y + jefe.h/2, w: 40, h: 10 }); jefe.timerDisparo = 0; }
                } else {
                    jefe.timerMuerte--; if (frame % 6 === 0) crearFuegoArtificial(jefe.x + Math.random()*jefe.w, jefe.y + Math.random()*jefe.h);
                    if (jefe.timerMuerte <= 60) fadeNegro += 0.02; if (fadeNegro >= 1.2) regresarAlMenu();
                }
                if (imgJefe.complete) ctx.drawImage(imgJefe, jefe.x, jefe.y, jefe.w, jefe.h);
                jefe.balas.forEach((b, bi) => {
                    b.x -= (6 + dificultad) * multNitro; ctx.fillStyle = "red"; ctx.fillRect(b.x, b.y, b.w, b.h);
                    if (neneX < b.x + b.w && neneX + neneSize > b.x && neneY < b.y + b.h && neneY + neneSize > b.y) { chocar(); jefe.balas.splice(bi, 1); }
                });
            }

            lasers.forEach((l, li) => {
                l.x += 15; if (neneActual !== "Iván") l.rot += 0.3;
                ctx.save(); ctx.translate(l.x + l.w/2, l.y); ctx.rotate(l.rot); if (l.img.complete) ctx.drawImage(l.img, -l.w/2, -l.h/2, l.w, l.h); ctx.restore();
                if (jefe.activo && !jefe.muriendo && l.x > jefe.x && l.x < jefe.x+jefe.w && l.y > jefe.y && l.y < jefe.y+jefe.h) {
                    jefe.hp--; lasers.splice(li, 1); if (jefe.hp <= 0) { jefe.muriendo = true; jefe.timerMuerte = 300; sumarPunto(100); sonidoVictoria.play(); }
                }
                navesEnemigas.forEach((n, ni) => {
                    if (l.x < n.x + n.w && l.x + l.w > n.x && l.y > n.y && l.y < n.y + n.h) {
                        for(let i=0; i<15; i++) fragmentos.push({ x: n.x + n.w/2, y: n.y + n.h/2, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, size: Math.random()*5+2, vida: 1, color: 'orange' });
                        textosBoom.push({ x: n.x + n.w/2, y: n.y + n.h/2, vida: 1 }); navesEnemigas.splice(ni, 1); lasers.splice(li, 1); sumarPunto(2);
                    }
                });
                if (l.x > canvas.width) lasers.splice(li, 1);
            });

            fuegos.forEach((f, fi) => { f.x += f.vx; f.y += f.vy; f.vida -= 0.02; if (f.vida <= 0) fuegos.splice(fi, 1); else { ctx.fillStyle = f.color; ctx.globalAlpha = f.vida; ctx.beginPath(); ctx.arc(f.x, f.y, 3, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; } });
            fragmentos.forEach((f, fi) => { f.x += f.vx; f.y += f.vy; f.vida -= 0.03; if (f.vida <= 0) fragmentos.splice(fi, 1); else { ctx.fillStyle = f.color; ctx.globalAlpha = f.vida; ctx.fillRect(f.x, f.y, f.size, f.size); ctx.globalAlpha = 1; } });
            textosBoom.forEach((t, ti) => { t.y -= 1; t.vida -= 0.02; if (t.vida <= 0) textosBoom.splice(ti, 1); else { ctx.fillStyle = `rgba(255, 165, 0, ${t.vida})`; ctx.font = 'bold 30px Arial Black'; ctx.textAlign = 'center'; ctx.fillText('¡BOOM!', t.x, t.y); } });

            if (neneY > canvas.height || neneY < 0) chocar();
            frame++;
        }

        if (inicioQuitado && invulnerable % 10 < 5) {
            let img = neneActual === "Iván" ? imgIvan : (neneActual === "Pedro" ? imgPedro : imgRambo);
            ctx.save();
            if (timerPoder > 0) ctx.filter = "brightness(1.5) drop-shadow(0px 0px 10px white)";
            if (timerNitro > 0) {
                ctx.filter = "contrast(1.5) brightness(1.2) drop-shadow(0px 0px 25px cyan)";
                ctx.translate((Math.random()-0.5)*8, (Math.random()-0.5)*8);
            }
            ctx.translate(neneX + neneSize/2, neneY + neneSize/2);
            ctx.rotate(activo ? Math.min(Math.PI/4, Math.max(-Math.PI/4, velY * 0.05)) : 0);
            if (img.complete) ctx.drawImage(img, -neneSize/2, -neneSize/2, neneSize, neneSize);
            ctx.restore(); ctx.filter = "none";
        }

        if (fadeNegro > 0) { ctx.fillStyle = "black"; ctx.globalAlpha = Math.min(1, fadeNegro); ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.globalAlpha = 1.0; }
        requestAnimationFrame(loop);
    }

    function resetRecord() { if(confirm("¿Seguro que querés borrar el record?")) { localStorage.setItem('hs_space_race', 0); highscore = 0; document.getElementById('record').innerText = "Record: 0"; } }

    loop();
</script>
